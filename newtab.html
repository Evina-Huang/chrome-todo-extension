<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>简洁待办</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="newtab-page">
    <main class="app newtab-app" aria-label="待办事项">
      <header class="header">
        <div class="header-copy">
          <span class="eyebrow">Task Deck</span>
          <h1>今日待办</h1>
          <p id="todayText" class="today"></p>
        </div>
        <div class="deck-meter" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </header>

      <form id="todoForm" class="add-form" autocomplete="off" aria-label="新增待办">
        <div class="task-field">
          <label for="todoInput">新增待办</label>
          <input id="todoInput" type="text" maxlength="80" placeholder="输入任务" />
        </div>
        <div class="category-field">
          <label for="categoryInput">分类</label>
          <input id="categoryInput" type="text" maxlength="18" placeholder="标签" list="categorySuggestions" />
          <datalist id="categorySuggestions"></datalist>
        </div>
        <button type="submit">添加</button>
      </form>

      <section class="control-panel" aria-label="筛选">
        <div class="toolbar" aria-label="筛选待办">
          <button class="filter active" type="button" data-filter="all">全部</button>
          <button class="filter" type="button" data-filter="active">进行中</button>
          <button class="filter" type="button" data-filter="done">已完成</button>
        </div>

        <div class="category-toolbar" aria-label="筛选分类">
          <button class="category-filter active" type="button" data-category="all">全部分类</button>
        </div>
      </section>

      <section class="content">
        <p id="emptyState" class="empty-state">还没有待办。先写下一件最重要的小事。</p>
        <ul id="todoList" class="todo-list" aria-live="polite"></ul>
      </section>

      <footer class="footer">
        <span id="countText">0 件待办</span>
        <button id="clearDone" class="ghost" type="button">清理已完成</button>
      </footer>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
